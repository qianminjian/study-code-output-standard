name: lint

on:
  workflow_call:
    inputs:
      shell-paths:
        description: 'shell 脚本扫描路径（空格分隔）'
        type: string
        default: '.'
      markdown-paths:
        description: 'markdown 扫描路径（空格分隔）'
        type: string
        default: '.'

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run shellcheck
        run: |
          set -e
          for path in ${{ inputs.shell-paths }}; do
            echo "=== shellcheck $path ==="
            find "$path" -type f \( -name "*.sh" -o -name "*.bash" \) -print0 \
              | xargs -0 -I{} bash -c 'shellcheck "$1" && echo "  ✓ $1" || echo "  ✗ $1"' _ {}
          done

  shfmt:
    name: shfmt (diff check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check shfmt format
        run: |
          set +e
          for path in ${{ inputs.shell-paths }}; do
            echo "=== shfmt -d $path ==="
            find "$path" -type f \( -name "*.sh" -o -name "*.bash" \) -print0 \
              | xargs -0 shfmt -d
          done
          exit 0  # 不阻断，让 shellcheck 决定

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint
        run: |
          npm install -g markdownlint-cli@0.45.0 >/dev/null 2>&1
          for path in ${{ inputs.markdown-paths }}; do
            echo "=== markdownlint $path ==="
            find "$path" -type f -name "*.md" -print0 \
              | xargs -0 markdownlint --ignore node_modules 2>&1 | head -50 || true
          done

name: secret-scan

on:
  workflow_call:
    inputs:
      scan-paths:
        description: '扫描路径（空格分隔）'
        type: string
        default: '.'
      exclude-paths:
        description: '排除路径（空格分隔）'
        type: string
        default: 'REVIEW.md 输出代码资产的提示词.md'

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCAN_PATHS: ${{ inputs.scan-paths }}
          EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
        run: |
          # 装 gitleaks
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.18.4_linux_amd64.tar.gz \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/

          # 构造 gitleaks 配置
          cat > /tmp/gitleaks.toml <<'EOF'
          title = "study-code-output-standard"
          [extend]
          useDefault = true
          EOF

          # 构造排除
          EXCLUDES=""
          for p in $EXCLUDE_PATHS; do
            EXCLUDES="$EXCLUDES --exclude-paths $p"
          done

          gitleaks detect \
            --no-git \
            --source "$SCAN_PATHS" \
            --config /tmp/gitleaks.toml \
            --exit-code 1 \
            $EXCLUDES

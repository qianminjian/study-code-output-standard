name: secret-scan

on:
  workflow_call:
    inputs:
      exclude-paths:
        description: 'gitleaks 排除路径（逗号分隔）'
        type: string
        default: 'REVIEW.md,输出代码资产的提示词.md,.serena'

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate gitleaks config
        env:
          EXCLUDES: ${{ inputs.exclude-paths }}
        run: |
          # 基础配置：扩展默认规则
          cat > gitleaks.toml <<EOF
          title = "study-code-output-standard"
          [extend]
          useDefault = true
          EOF

          # 排除指定路径
          IFS=',' read -ra PATHS <<< "$EXCLUDES"
          for p in "${PATHS[@]}"; do
            p=$(echo "$p" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$p" ] && continue
            cat >> gitleaks.toml <<EOF2

          [[allowlists]]
          description = "exclude: $p"
          paths = ['$p']
          EOF2
          cat gitleaks.toml

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACTS: true

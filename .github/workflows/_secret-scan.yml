name: secret-scan

on:
  workflow_call:
    inputs:
      scan-paths:
        description: '扫描路径（相对仓根）'
        type: string
        default: '.'

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run secret + path leak scan
        working-directory: ${{ inputs.scan-paths }}
        run: |
          set +e
          echo "=== Running secrets.test.sh ==="
          bash _proc-use/tests/secrets.test.sh
          SECRETS_RC=$?
          echo "=== Running no-leak-path.test.sh ==="
          bash _proc-use/tests/no-leak-path.test.sh
          PATH_RC=$?
          echo "--- summary ---"
          echo "secrets.test.sh exit: $SECRETS_RC"
          echo "no-leak-path.test.sh exit: $PATH_RC"
          if [ "$SECRETS_RC" -ne 0 ] || [ "$PATH_RC" -ne 0 ]; then
            echo "::error::secret scan failed"
            exit 1
          fi

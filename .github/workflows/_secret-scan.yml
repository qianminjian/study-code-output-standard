name: secret-scan

on:
  workflow_call:
    inputs:
      exclude-paths:
        description: 'gitleaks 排除路径（YAML 列表，逗号分隔）'
        type: string
        default: 'REVIEW.md,输出代码资产的提示词.md'

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate gitleaks config
        run: |
          # 构造 gitleaks 配置：扩展默认规则 + 排除指定路径
          EXCLUDES="${{ inputs.exclude-paths }}"
          cat > /tmp/gitleaks.toml <<EOF
          title = "study-code-output-standard"
          [extend]
          useDefault = true
          EOF

          # 添加排除（gitleaks 8.x 格式）
          IFS=',' read -ra PATHS <<< "$EXCLUDES"
          for p in "${PATHS[@]}"; do
            p=$(echo "$p" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$p" ] && continue
            cat >> /tmp/gitleaks.toml <<EOF

          [[allowlists]]
          description = "exclude: $p"
          paths = ['$p']
          EOF
          echo "--- generated config ---"
          cat /tmp/gitleaks.toml

      - name: Run gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: /tmp/gitleaks.toml
        run: |
          # 装 gitleaks v8
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_amd64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/
          gitleaks version

          # 扫，leak 退 1，error 退 2
          gitleaks detect --source . --config /tmp/gitleaks.toml --verbose

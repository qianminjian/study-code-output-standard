name: secret-scan

on:
  workflow_call:
    inputs:
      exclude-paths:
        description: 'gitleaks 排除路径（逗号分隔）'
        type: string
        default: 'REVIEW.md,输出代码资产的提示词.md,.serena'

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate gitleaks config
        env:
          EXCLUDES: ${{ inputs.exclude-paths }}
        run: |
          # 默认规则 + 排除指定文件/目录
          cat > gitleaks.toml <<EOF
          title = "study-code-output-standard"
          [extend]
          useDefault = true
          EOF

          # 每个排除路径一个 [[allowlists]] block
          IFS=',' read -ra PATHS <<< "$EXCLUDES"
          for p in "${PATHS[@]}"; do
            p=$(echo "$p" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$p" ] && continue
            cat >> gitleaks.toml <<EOF2

          [[allowlists]]
          description = "exclude: $p"
          paths = ['$p']
          EOF2
          echo "--- gitleaks config ---"
          cat gitleaks.toml

      - name: Run gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gitleaks detect --source . --config gitleaks.toml --verbose --exit-code 1

name: test

on:
  workflow_call:
    inputs:
      working-directory:
        description: '测试工作目录（相对仓根）'
        type: string
        default: '.'
      test-command:
        description: '测试入口命令'
        type: string
        default: 'bash tests/run-all.sh'

jobs:
  test:
    name: tests/run-all.sh
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set UTF-8 locale
        run: |
          sudo locale-gen en_US.UTF-8 >/dev/null 2>&1 || true
          echo "LANG=en_US.UTF-8" >> "$GITHUB_ENV"
          echo "LC_ALL=en_US.UTF-8" >> "$GITHUB_ENV"

      - name: Run test suite
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}
